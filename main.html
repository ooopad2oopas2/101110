<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>101110 — Nerdian worksheet glass</title>
<style>
:root{--bg:#0b1020;--panel:#141c33;--accent:#5ee7a5;--muted:#8ea4c9;--warn:#f5b14a;--txt:#e8f0ff}
*{box-sizing:border-box}
body{margin:0;font-family:ui-sans-serif,system-ui,Segoe UI,Roboto,Helvetica,Arial;background:radial-gradient(1200px 800px at 20% 0%,#152042 0%,var(--bg) 55%);color:var(--txt);min-height:100vh}
header{padding:1.4rem 1.6rem;border-bottom:1px solid #223056;display:flex;flex-wrap:wrap;gap:1rem;align-items:center;justify-content:space-between}
h1{font-size:1.35rem;font-weight:650;letter-spacing:.04em;margin:0}
.tag{font-size:.78rem;color:var(--muted);border:1px solid #2c3d63;padding:.25rem .5rem;border-radius:999px}
main{max-width:1100px;margin:0 auto;padding:1.2rem 1.4rem 3rem;display:grid;gap:1rem}
.panel{background:linear-gradient(165deg,#182544,#121a30 70%);border:1px solid #273a5e;border-radius:14px;padding:1rem 1.1rem;box-shadow:0 12px 40px rgba(0,0,0,.35)}
.panel h2{margin:0 0 .6rem;font-size:1.05rem;color:var(--accent)}
.row{display:flex;flex-wrap:wrap;gap:.6rem;align-items:center}
label{font-size:.82rem;color:var(--muted)}
input,textarea,select{background:#0d1428;border:1px solid #314771;color:var(--txt);border-radius:10px;padding:.45rem .55rem;font-size:.92rem}
textarea{width:100%;min-height:84px;resize:vertical}
button{background:linear-gradient(180deg,#3fe0a8,#2bb87f);border:none;color:#062217;font-weight:650;padding:.55rem .9rem;border-radius:10px;cursor:pointer}
button.secondary{background:#2c3d63;color:var(--txt)}
button:disabled{opacity:.45;cursor:not-allowed}
.out{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.85rem;background:#070b16;border:1px dashed #35527c;border-radius:10px;padding:.65rem;white-space:pre-wrap;word-break:break-all}
.grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:.8rem}
footer{padding:1rem 1.4rem;color:var(--muted);font-size:.78rem;border-top:1px solid #223056;text-align:center}
a{color:var(--accent)}
.addr{font-size:.72rem;opacity:.9}
</style>
</head>
<body>
<header>
<h1>101110 <span class="tag">binary glass</span></h1>
<div class="tag">HumaCalcXXI surface · client-side only</div>
</header>
<main>
<section class="panel"><h2>Anchor roster</h2><div class="out" id="anchors"></div></section>
<section class="panel grid2">
<div><h2>Fold complexity</h2><label>weights (comma)</label><input id="w" value="2,3,5"/><label>exponents (comma)</label><input id="e" value="2,1,3"/><div class="row" style="margin-top:.5rem"><button id="btnFold">Compute</button></div><div class="out" id="oFold"></div></div>
<div><h2>Hilbert slot</h2><label>dimBits</label><input id="hd" type="number" value="3"/><label>x</label><input id="hx" type="number" value="2"/><label>y</label><input id="hy" type="number" value="5"/><div class="row" style="margin-top:.5rem"><button id="btnHil">Compute</button></div><div class="out" id="oHil"></div></div>
</section>
<section class="panel"><h2>Softmax (toy)</h2><label>logits</label><input id="lg" value="1.0,2.0,0.5"/><label>temp</label><input id="tp" type="number" step="0.1" value="1"/><div class="row" style="margin-top:.5rem"><button id="btnSm">Normalize</button></div><div class="out" id="oSm"></div></section>
<section class="panel"><h2>Deploy JSON sketch</h2><label>stake token</label><input id="st" class="addr" value="0x0000000000000000000000000000000000000001"/><div class="row" style="margin-top:.5rem"><button class="secondary" id="btnDj">Build JSON</button></div><div class="out" id="oDj"></div></section>
</main>
<footer>101110 does not broadcast signed transactions. Wire your own RPC signer stack for chain actions.</footer>
